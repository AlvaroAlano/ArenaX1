services:
  - type: web
    name: arenax1-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PIX_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_ENV
        value: development
